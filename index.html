<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Golf Scorecard</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #4caf50;
            --bg-color: #f1f8e9;
            --text-dark: #333;
            --white: #ffffff;
            --danger: #d32f2f;
        }

        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-green);
            margin: 0;
        }

        .view {
            display: none;
            width: 100%;
            max-width: 600px;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .view.active {
            display: block;
        }

        .setup-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid var(--light-green);
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        .btn-add {
            background-color: var(--primary-green);
            color: white;
        }

        .btn-start {
            background-color: var(--light-green);
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-reset {
            background-color: var(--danger);
            color: white;
            margin-top: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .btn-remove {
            background: var(--danger);
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }

        /* Ball Color Picker Styles */
        .ball-picker {
            width: 24px;
            height: 24px;
            padding: 0;
            border: none;
            background: none;
            cursor: pointer;
            margin-right: 12px;
            flex-shrink: 0;
            -webkit-appearance: none;
            appearance: none;
        }

        .ball-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .ball-picker::-webkit-color-swatch {
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2);
        }

        /* Standard Ball Circle (for summary/non-interactive) */
        .ball-circle {
            width: 20px;
            height: 20px;
            background-color: currentColor;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
            border: 1px solid rgba(0,0,0,0.1);
            flex-shrink: 0;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2);
        }

        .player-label {
            cursor: pointer;
            display: flex;
            align-items: center;
            flex-grow: 1;
            padding: 5px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .player-label:hover {
            background-color: #f0fdf4;
            color: var(--primary-green);
        }

        /* Scorecard Table Styles */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 4px;
            text-align: center;
            font-size: 14px;
        }

        th {
            background-color: var(--primary-green);
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .th-player {
            padding: 0;
        }

        .th-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 4px;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .th-content:hover {
            background-color: var(--light-green);
        }

        .score-input {
            width: 100%;
            max-width: 45px;
            padding: 8px 2px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .total-cell {
            font-weight: bold;
            background-color: #f9f9f9;
        }

        .total-row {
            background-color: #eee;
            font-weight: bold;
        }

        .winner {
            background-color: #fff9c4;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            body { padding: 10px 5px; }
            .view { padding: 10px; }
            table { 
                min-width: 0; 
                table-layout: fixed;
            }
            th, td {
                padding: 4px 2px;
                font-size: 13px;
            }
            .score-input {
                font-size: 16px;
                padding: 6px 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>⛳ Scorecard</h1>
    </header>

    <!-- Setup View -->
    <div id="setup-view" class="view active">
        <h3>Course Setup</h3>
        <div class="setup-group">
            <input type="text" id="course-name" placeholder="Course Name (e.g. Pirate Cove)" aria-label="Course name">
        </div>
        <h3>Add Players</h3>
        <p style="font-size: 0.9em; color: #666; margin-top: -10px;">Click ball or name to choose color</p>
        <div class="setup-group">
            <input type="text" id="player-name" placeholder="Enter name..." aria-label="Player name">
            <button class="btn-add" onclick="addPlayer()">Add</button>
        </div>
        <ul id="player-list"></ul>
        <button id="start-btn" class="btn-start" onclick="startGame()" style="display: none;">Start Game</button>
    </div>

    <!-- Scorecard View -->
    <div id="scorecard-view" class="view">
        <h3 id="current-course-display" style="text-align: center; color: var(--primary-green);"></h3>
        <div class="table-container">
            <table id="score-table">
                <thead>
                    <tr id="table-header">
                        <th>Hole</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
        <button class="btn-start" onclick="showSummary()">Finish Game</button>
        <button class="btn-reset" onclick="resetGame()">Reset All</button>
    </div>

    <!-- Summary View -->
    <div id="summary-view" class="view">
        <h3 id="summary-title" style="text-align: center; color: var(--primary-green);">Game Results</h3>
        <div id="summary-content"></div>
        <div id="summary-actions" style="margin-top: 20px;">
            <button id="next-course-btn" class="btn-start" onclick="prepareNextCourse()">Next Course</button>
            <button class="btn-reset" onclick="resetGame()">New Game (Reset All)</button>
        </div>
    </div>

    <script>
        const DEFAULT_COLORS = [
            '#e53935', '#1e88e5', '#43a047', '#fdd835', 
            '#fb8c00', '#8e24aa', '#d81b60', '#00bcd4',
            '#795548', '#212121', '#9e9e9e', '#4caf50'
        ];

        let state = {
            players: [],
            playerColors: {},
            games: [], // Array of { courseName: string, scores: { playerName: [9] } }
            currentCourseName: '',
            currentScores: {}, // { playerName: [9] }
            gameStarted: false
        };

        function init() {
            const saved = localStorage.getItem('crazyGolfStateV2');
            if (saved) {
                state = JSON.parse(saved);
                if (state.gameStarted) {
                    showView('scorecard-view');
                    renderScorecard();
                } else if (state.games && state.games.length > 0) {
                    renderSummary();
                    showView('summary-view');
                } else {
                    renderPlayerList();
                }
            }
        }

        function save() {
            localStorage.setItem('crazyGolfStateV2', JSON.stringify(state));
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function addPlayer() {
            const input = document.getElementById('player-name');
            const name = input.value.trim();
            if (name && !state.players.includes(name)) {
                state.players.push(name);
                state.currentScores[name] = Array(9).fill(0);
                state.playerColors[name] = DEFAULT_COLORS[(state.players.length - 1) % DEFAULT_COLORS.length];
                input.value = '';
                renderPlayerList();
                save();
            }
        }

        function removePlayer(index) {
            const name = state.players[index];
            delete state.currentScores[name];
            delete state.playerColors[name];
            state.players.splice(index, 1);
            renderPlayerList();
            save();
        }

        function updatePlayerColor(playerName, newColor) {
            state.playerColors[playerName] = newColor;
            save();
            if (state.gameStarted) {
                renderScorecard();
            } else {
                renderPlayerList();
            }
        }

        function renderPlayerList() {
            const list = document.getElementById('player-list');
            const startBtn = document.getElementById('start-btn');
            list.innerHTML = '';
            state.players.forEach((player, index) => {
                const li = document.createElement('li');
                const color = state.playerColors[player] || '#ccc';
                li.innerHTML = `
                    <label class="player-label">
                        <input type="color" class="ball-picker" 
                            value="${color}" 
                            onchange="updatePlayerColor('${player}', this.value)">
                        <span>${player}</span>
                    </label>
                    <button class="btn-remove" onclick="removePlayer(${index})">Remove</button>
                `;
                list.appendChild(li);
            });
            startBtn.style.display = state.players.length > 0 ? 'block' : 'none';
        }

        function startGame() {
            const courseInput = document.getElementById('course-name');
            const courseName = courseInput.value.trim() || 'Course ' + (state.games.length + 1);
            
            if (state.players.length === 0) return;
            
            state.currentCourseName = courseName;
            state.gameStarted = true;
            
            // Initialize scores for the new game if not already there
            state.players.forEach(p => {
                if (!state.currentScores[p]) state.currentScores[p] = Array(9).fill(0);
            });

            showView('scorecard-view');
            renderScorecard();
            save();
        }

        function renderScorecard() {
            document.getElementById('current-course-display').innerText = state.currentCourseName;
            const headerRow = document.getElementById('table-header');
            const body = document.getElementById('table-body');
            headerRow.innerHTML = '<th>Hole</th>';
            state.players.forEach(player => {
                const color = state.playerColors[player] || '#ccc';
                headerRow.innerHTML += `
                    <th class="th-player">
                        <div class="th-content">
                            <input type="color" class="ball-picker" 
                                style="width: 16px; height: 16px; margin-right: 0;"
                                value="${color}" 
                                onchange="updatePlayerColor('${player}', this.value)">
                            <span>${player}</span>
                        </div>
                    </th>`;
            });
            body.innerHTML = '';
            for (let hIndex = 0; hIndex < 9; hIndex++) {
                const tr = document.createElement('tr');
                let rowHtml = `<td>${hIndex + 1}</td>`;
                state.players.forEach(player => {
                    const val = state.currentScores[player][hIndex] || '';
                    rowHtml += `<td><input type="number" class="score-input" value="${val}" min="1" oninput="updateScore('${player}', ${hIndex}, this.value)"></td>`;
                });
                tr.innerHTML = rowHtml;
                body.appendChild(tr);
            }
            const totalTr = document.createElement('tr');
            totalTr.className = 'total-row';
            let totalHtml = '<td>Total</td>';
            state.players.forEach(player => {
                const total = state.currentScores[player].reduce((a, b) => a + (parseInt(b) || 0), 0);
                totalHtml += `<td id="total-${player}" class="total-cell">${total}</td>`;
            });
            totalTr.innerHTML = totalHtml;
            body.appendChild(totalTr);
        }

        function updateScore(playerName, holeIndex, value) {
            const score = parseInt(value) || 0;
            state.currentScores[playerName][holeIndex] = score;
            const total = state.currentScores[playerName].reduce((a, b) => a + (parseInt(b) || 0), 0);
            const totalCell = document.getElementById(`total-${playerName}`);
            if (totalCell) totalCell.innerText = total;
            save();
        }

        function showSummary() {
            if (state.gameStarted) {
                // Save current game to history
                const currentGame = {
                    courseName: state.currentCourseName,
                    scores: JSON.parse(JSON.stringify(state.currentScores))
                };
                state.games.push(currentGame);
                state.gameStarted = false;
            }
            
            renderSummary();
            showView('summary-view');
            save();
        }

        function renderSummary() {
            const content = document.getElementById('summary-content');
            const title = document.getElementById('summary-title');
            const nextBtn = document.getElementById('next-course-btn');
            
            content.innerHTML = '';
            
            const totalGames = state.games.length;
            title.innerText = totalGames === 3 ? 'Tournament Complete' : 'Game Results';

            // 1. List individual game results
            state.games.forEach((game, gIndex) => {
                const gameDiv = document.createElement('div');
                gameDiv.style.marginBottom = '20px';
                
                const gameHeader = document.createElement('h4');
                gameHeader.innerText = `Game ${gIndex + 1}: ${game.courseName}`;
                gameHeader.style.color = 'var(--primary-green)';
                gameHeader.style.borderBottom = '2px solid var(--light-green)';
                gameHeader.style.paddingBottom = '5px';
                gameHeader.style.marginTop = '0';
                gameDiv.appendChild(gameHeader);

                const gameList = document.createElement('ul');
                const gameStandings = state.players.map(p => ({
                    name: p,
                    total: game.scores[p].reduce((a, b) => a + (parseInt(b) || 0), 0),
                    color: state.playerColors[p]
                })).sort((a, b) => a.total - b.total);

                gameStandings.forEach((res, i) => {
                    const li = document.createElement('li');
                    li.style.padding = '8px 10px';
                    if (i === 0) li.style.backgroundColor = '#fff9c4';
                    li.innerHTML = `
                        <div style="display: flex; align-items: center;">
                            <span style="width: 25px;">${i + 1}.</span>
                            <div class="ball-circle" style="color: ${res.color}"></div>
                            <span>${res.name}</span>
                        </div>
                        <span style="font-weight: bold;">${res.total}</span>
                    `;
                    gameList.appendChild(li);
                });
                gameDiv.appendChild(gameList);
                content.appendChild(gameDiv);
            });

            // 2. Overall Leaderboard Table
            const leaderboardDiv = document.createElement('div');
            leaderboardDiv.style.marginTop = '30px';
            leaderboardDiv.style.padding = '15px';
            leaderboardDiv.style.backgroundColor = '#f0fdf4';
            leaderboardDiv.style.borderRadius = '12px';
            leaderboardDiv.style.border = '2px solid var(--primary-green)';

            const lbTitle = document.createElement('h3');
            lbTitle.innerText = '🏆 Overall Leaderboard';
            lbTitle.style.textAlign = 'center';
            lbTitle.style.margin = '0 0 15px 0';
            lbTitle.style.color = 'var(--primary-green)';
            leaderboardDiv.appendChild(lbTitle);

            const tableWrap = document.createElement('div');
            tableWrap.className = 'table-container';
            tableWrap.style.marginTop = '0';

            const table = document.createElement('table');
            table.style.backgroundColor = 'white';
            
            // Header
            let thead = '<thead><tr><th>Rank</th><th>Player</th>';
            state.games.forEach((_, i) => thead += `<th>G${i+1}</th>`);
            thead += '<th>Total</th></tr></thead>';
            table.innerHTML = thead;

            // Body
            const tbody = document.createElement('tbody');
            const overallStandings = state.players.map(player => {
                const gameTotals = state.games.map(g => 
                    (g.scores[player] || []).reduce((a, b) => a + (parseInt(b) || 0), 0)
                );
                const overallTotal = gameTotals.reduce((a, b) => a + b, 0);
                return { name: player, gameTotals, overallTotal, color: state.playerColors[player] };
            }).sort((a, b) => a.overallTotal - b.overallTotal);

            overallStandings.forEach((res, i) => {
                const tr = document.createElement('tr');
                if (i === 0) tr.style.backgroundColor = '#fff9c4';
                
                let rowHtml = `
                    <td>${i + 1}</td>
                    <td style="text-align: left; padding-left: 10px;">
                        <div class="ball-circle" style="color: ${res.color}; width: 12px; height: 12px; margin-right: 5px;"></div>
                        ${res.name}
                    </td>
                `;
                res.gameTotals.forEach(gt => rowHtml += `<td>${gt}</td>`);
                rowHtml += `<td style="font-weight: bold; color: var(--primary-green);">${res.overallTotal}</td>`;
                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            tableWrap.appendChild(table);
            leaderboardDiv.appendChild(tableWrap);
            content.appendChild(leaderboardDiv);

            if (totalGames >= 3) {
                nextBtn.style.display = 'none';
            } else {
                nextBtn.style.display = 'block';
                nextBtn.innerText = `Start Game ${totalGames + 1}`;
            }
        }

        function prepareNextCourse() {
            const nextCourse = prompt('Enter the name for the next course:');
            if (nextCourse !== null) {
                state.currentCourseName = nextCourse || `Course ${state.games.length + 1}`;
                // Reset current scores for the next round
                state.players.forEach(p => {
                    state.currentScores[p] = Array(9).fill(0);
                });
                state.gameStarted = true;
                showView('scorecard-view');
                renderScorecard();
                save();
            }
        }

        function resetGame() {
            if (confirm('Are you sure you want to reset everything? This will clear all players and games.')) {
                state = {
                    players: [],
                    playerColors: {},
                    games: [],
                    currentCourseName: '',
                    currentScores: {},
                    gameStarted: false
                };
                localStorage.removeItem('crazyGolfStateV2');
                renderPlayerList();
                const courseNameInput = document.getElementById('course-name');
                if (courseNameInput) courseNameInput.value = '';
                showView('setup-view');
            }
        }
        window.onload = init;
    </script>
</body>
</html>
