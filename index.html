<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Golf Scorecard</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #4caf50;
            --bg-color: #f1f8e9;
            --text-dark: #333;
            --white: #ffffff;
            --danger: #d32f2f;
        }

        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-green);
            margin: 0;
        }

        .view {
            display: none;
            width: 100%;
            max-width: 600px;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .view.active {
            display: block;
        }

        .setup-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid var(--light-green);
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        .btn-add {
            background-color: var(--primary-green);
            color: white;
        }

        .btn-start {
            background-color: var(--light-green);
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-reset {
            background-color: var(--danger);
            color: white;
            margin-top: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .btn-remove {
            background: var(--danger);
            color: white;
            padding: 5px 10px;
            font-size: 12px;
        }

        /* Ball Circle Styles */
        .ball-circle {
            width: 20px;
            height: 20px;
            background-color: currentColor;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
            border: 1px solid rgba(0,0,0,0.1);
            flex-shrink: 0;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2);
        }

        .player-name-clickable {
            cursor: pointer;
            display: flex;
            align-items: center;
            flex-grow: 1;
            padding: 5px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .player-name-clickable:hover {
            background-color: #f0fdf4;
            color: var(--primary-green);
        }

        /* Scorecard Table Styles */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 4px;
            text-align: center;
            font-size: 14px;
        }

        th {
            background-color: var(--primary-green);
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .th-player {
            cursor: pointer;
            padding: 0;
        }

        .th-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 4px;
            width: 100%;
            height: 100%;
        }

        .th-player:hover {
            background-color: var(--light-green);
        }

        .score-input {
            width: 100%;
            max-width: 45px;
            padding: 8px 2px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .total-cell {
            font-weight: bold;
            background-color: #f9f9f9;
        }

        .total-row {
            background-color: #eee;
            font-weight: bold;
        }

        .winner {
            background-color: #fff9c4;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            body { padding: 10px 5px; }
            .view { padding: 10px; }
            table { 
                min-width: 0; 
                table-layout: fixed;
            }
            th, td {
                padding: 4px 2px;
                font-size: 13px;
            }
            .score-input {
                font-size: 16px;
                padding: 6px 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>⛳ Scorecard</h1>
    </header>

    <!-- Setup View -->
    <div id="setup-view" class="view active">
        <h3>Add Players</h3>
        <p style="font-size: 0.9em; color: #666; margin-top: -10px;">Click a name to choose ball color</p>
        <div class="setup-group">
            <input type="text" id="player-name" placeholder="Enter name..." aria-label="Player name">
            <button class="btn-add" onclick="addPlayer()">Add</button>
        </div>
        <ul id="player-list"></ul>
        <button id="start-btn" class="btn-start" onclick="startGame()" style="display: none;">Start Game</button>
    </div>

    <!-- Scorecard View -->
    <div id="scorecard-view" class="view">
        <div class="table-container">
            <table id="score-table">
                <thead>
                    <tr id="table-header">
                        <th>Hole</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
        <button class="btn-start" onclick="showSummary()">Finish Game</button>
        <button class="btn-reset" onclick="resetGame()">Reset Game</button>
    </div>

    <!-- Summary View -->
    <div id="summary-view" class="view">
        <h3>Final Standings</h3>
        <ul id="summary-list"></ul>
        <button class="btn-start" onclick="resetGame()">New Game</button>
    </div>

    <!-- Hidden Native Color Picker -->
    <input type="color" id="native-color-picker" style="display: none;">

    <script>
        const DEFAULT_COLORS = [
            '#e53935', '#1e88e5', '#43a047', '#fdd835', 
            '#fb8c00', '#8e24aa', '#d81b60', '#00bcd4',
            '#795548', '#212121', '#9e9e9e', '#4caf50'
        ];

        let state = {
            players: [],
            playerColors: {},
            scores: {},
            gameStarted: false
        };

        function init() {
            const saved = localStorage.getItem('crazyGolfState');
            if (saved) {
                const parsed = JSON.parse(saved);
                state = {
                    players: parsed.players || [],
                    playerColors: parsed.playerColors || {},
                    scores: parsed.scores || {},
                    gameStarted: !!parsed.gameStarted
                };
                state.players.forEach((p, i) => {
                    if (!state.playerColors[p]) {
                        state.playerColors[p] = DEFAULT_COLORS[i % DEFAULT_COLORS.length];
                    }
                });
                if (state.gameStarted) {
                    showView('scorecard-view');
                    renderScorecard();
                } else {
                    renderPlayerList();
                }
            }
        }

        function save() {
            localStorage.setItem('crazyGolfState', JSON.stringify(state));
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function addPlayer() {
            const input = document.getElementById('player-name');
            const name = input.value.trim();
            if (name && !state.players.includes(name)) {
                state.players.push(name);
                state.scores[name] = Array(9).fill(0);
                state.playerColors[name] = DEFAULT_COLORS[(state.players.length - 1) % DEFAULT_COLORS.length];
                input.value = '';
                renderPlayerList();
                save();
            }
        }

        function removePlayer(index) {
            const name = state.players[index];
            delete state.scores[name];
            delete state.playerColors[name];
            state.players.splice(index, 1);
            renderPlayerList();
            save();
        }

        function renderPlayerList() {
            const list = document.getElementById('player-list');
            const startBtn = document.getElementById('start-btn');
            list.innerHTML = '';
            state.players.forEach((player, index) => {
                const li = document.createElement('li');
                const color = state.playerColors[player] || '#ccc';
                li.innerHTML = `
                    <div class="player-name-clickable" onclick="openColorPicker('${player}')">
                        <div class="ball-circle" style="color: ${color}"></div>
                        <span>${player}</span>
                    </div>
                    <button class="btn-remove" onclick="removePlayer(${index})">Remove</button>
                `;
                list.appendChild(li);
            });
            startBtn.style.display = state.players.length > 0 ? 'block' : 'none';
        }

        function openColorPicker(playerName) {
            const picker = document.getElementById('native-color-picker');
            picker.oninput = (e) => {
                state.playerColors[playerName] = e.target.value;
                save();
                if (state.gameStarted) {
                    renderScorecard();
                } else {
                    renderPlayerList();
                }
            };
            picker.value = state.playerColors[playerName] || '#000000';
            picker.click();
        }

        function startGame() {
            if (state.players.length === 0) return;
            state.gameStarted = true;
            showView('scorecard-view');
            renderScorecard();
            save();
        }

        function renderScorecard() {
            const headerRow = document.getElementById('table-header');
            const body = document.getElementById('table-body');
            headerRow.innerHTML = '<th>Hole</th>';
            state.players.forEach(player => {
                const color = state.playerColors[player] || '#ccc';
                headerRow.innerHTML += `
                    <th onclick="openColorPicker('${player}')" class="th-player">
                        <div class="th-content">
                            <div class="ball-circle" style="color: ${color}; width: 14px; height: 14px; margin-right: 0;"></div>
                            <span>${player}</span>
                        </div>
                    </th>`;
            });
            body.innerHTML = '';
            for (let hIndex = 0; hIndex < 9; hIndex++) {
                const tr = document.createElement('tr');
                let rowHtml = `<td>${hIndex + 1}</td>`;
                state.players.forEach(player => {
                    const val = state.scores[player][hIndex] || '';
                    rowHtml += `<td><input type="number" class="score-input" value="${val}" min="1" oninput="updateScore('${player}', ${hIndex}, this.value)"></td>`;
                });
                tr.innerHTML = rowHtml;
                body.appendChild(tr);
            }
            const totalTr = document.createElement('tr');
            totalTr.className = 'total-row';
            let totalHtml = '<td>Total</td>';
            state.players.forEach(player => {
                const total = state.scores[player].reduce((a, b) => a + (parseInt(b) || 0), 0);
                totalHtml += `<td id="total-${player}" class="total-cell">${total}</td>`;
            });
            totalTr.innerHTML = totalHtml;
            body.appendChild(totalTr);
        }

        function updateScore(playerName, holeIndex, value) {
            const score = parseInt(value) || 0;
            state.scores[playerName][holeIndex] = score;
            const total = state.scores[playerName].reduce((a, b) => a + (parseInt(b) || 0), 0);
            document.getElementById(`total-${playerName}`).innerText = total;
            save();
        }

        function showSummary() {
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            const results = state.players.map(name => ({ name, total: state.scores[name].reduce((a, b) => a + (parseInt(b) || 0), 0) }));
            results.sort((a, b) => a.total - b.total);
            results.forEach((res, index) => {
                const li = document.createElement('li');
                if (index === 0) li.className = 'winner';
                const color = state.playerColors[res.name] || '#ccc';
                li.innerHTML = `<div style="display: flex; align-items: center;"><span style="margin-right: 10px;">${index + 1}.</span><div class="ball-circle" style="color: ${color}"></div><span>${res.name}</span></div><span>${res.total}</span>`;
                list.appendChild(li);
            });
            showView('summary-view');
        }

        function resetGame() {
            if (confirm('Are you sure you want to reset?')) {
                state = { players: [], playerColors: {}, scores: {}, gameStarted: false };
                localStorage.removeItem('crazyGolfState');
                renderPlayerList();
                showView('setup-view');
            }
        }
        window.onload = init;
    </script>
</body>
</html>
